<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultimate Dungeon Master</title>
  <style>
    body { font-family: Georgia, serif; background: #1a1a1a; color: #e0e0e0; max-width: 800px; margin: 0 auto; padding: 20px; }
    h1 { color: #d4af37; text-align: center; }
    #narrative { background: #0d0d0d; border: 2px solid #d4af37; padding: 20px; min-height: 200px; margin: 20px 0; line-height: 1.6; }
    input { width: 80%; padding: 10px; font-size: 16px; background: #333; color: #e0e0e0; border: 1px solid #666; }
    button { width: 15%; padding: 10px; font-size: 16px; background: #d4af37; color: #1a1a1a; border: none; cursor: pointer; }
    #loading { display: none; color: #d4af37; }
  </style>
</head>
<body>
  <h1>Ultimate Dungeon Master</h1>
  <div id="narrative"><p>You stand at the edge of a vast dungeon...</p></div>
  <div>
    <input type="text" id="actionInput" placeholder="What do you do?" autofocus>
    <button onclick="submitAction()">Submit</button>
<!-- Diagnostic Panel -->
<div id="diagnostics" style="margin-top: 20px; padding: 10px; background: #1a1a1a; border: 1px solid #333; font-family: monospace; font-size: 12px; max-height: 300px; overflow-y: auto; color: #0f0;">
  <h3 style="margin: 0 0 10px 0;">🔧 DIAGNOSTICS</h3>
  <div id="diagnostic-log"></div>
</div>

<!-- DeepSeek Debug Console -->
<div id="debugConsole" style="margin-top: 20px; padding: 15px; background: #0d0d0d; border: 2px solid #4a90e2; border-radius: 4px;">
  <h3 style="margin: 0 0 10px 0; color: #4a90e2;">🤖 ASK DEEPSEEK</h3>
  <p style="font-size: 12px; color: #888; margin: 0 0 10px 0;">Ask the AI about the world, locations, generation, or debug info. Turn will NOT advance.</p>
  <div style="margin-bottom: 10px;">
    <input type="text" id="debugQuestion" placeholder="e.g., Why are there no people here? Tell me about this biome..." style="width: 70%; padding: 10px; font-size: 14px; background: #333; color: #e0e0e0; border: 1px solid #666; margin-right: 10px;">
    <select id="debugLevel" style="width: 18%; padding: 10px; font-size: 14px; background: #333; color: #e0e0e0; border: 1px solid #666;">
      <option value="basic">Basic</option>
      <option value="detailed" selected>Detailed</option>
      <option value="full">Full</option>
    </select>
  </div>
  <div style="margin-bottom: 10px;">
    <button onclick="askDeepSeek()" style="width: 49%; padding: 10px; font-size: 14px; background: #4a90e2; color: white; border: none; cursor: pointer; border-radius: 3px; margin-right: 2%;">Ask DeepSeek</button>
    <button onclick="testContext()" style="width: 49%; padding: 10px; font-size: 14px; background: #888; color: white; border: none; cursor: pointer; border-radius: 3px;">Test Context</button>
  </div>
  <div id="debugLoading" style="display: none; color: #4a90e2; margin-top: 10px; font-size: 12px;">Consulting the AI...</div>
  <div id="debugResponse" style="margin-top: 15px; padding: 10px; background: #1a1a1a; border: 1px solid #4a90e2; border-radius: 3px; min-height: 50px; color: #fff; font-size: 13px; line-height: 1.5; max-height: 400px; overflow-y: auto; display: none;"></div>
</div>

  </div>
  <div id="loading">Loading narrative...</div>

  <script>
    // Store session ID across page loads
    let currentSessionId = null;

    async function submitAction() {
      const action = document.getElementById('actionInput').value;
      if (!action) return;
      
      document.getElementById('loading').style.display = 'block';
      
      try {
        const headers = { 'Content-Type': 'application/json' };
        // Send sessionId if we have one (all turns after first)
        if (currentSessionId) {
          headers['x-session-id'] = currentSessionId;
        }

        const response = await fetch('/narrate', {
          method: 'POST',
          headers: headers,
          body: JSON.stringify({ action: action })
        });
        
        const data = await response.json();
        
        // Store sessionId from response (important for subsequent turns!)
        if (data.sessionId) {
          currentSessionId = data.sessionId;
          console.log('[SESSION] SessionId:', currentSessionId);
        }

const narrative = data.narrative || data.error || 'No response from server';
document.getElementById('narrative').innerHTML = `<p>${narrative}</p>`;
document.getElementById('actionInput').value = '';

// Display diagnostics
const diagLog = document.getElementById('diagnostic-log');
const diag = data.diagnostics || {};
diagLog.innerHTML = `
  <div><strong>Turn:</strong> ${diag.first_turn ? 'FIRST' : 'ongoing'}</div>
  <div><strong>Biome:</strong> ${diag.macro_biome || '<span style="color: #f00;">UNDEFINED</span>'}</div>
  <div><strong>Has World Prompt:</strong> ${diag.has_world_prompt ? 'YES' : '<span style="color: #f00;">NO</span>'}</div>
  <div><strong>Prompt Value:</strong> "${diag.world_prompt_value || 'none'}"</div>
  <div><strong>Cells Generated:</strong> ${diag.cells_generated || 0}</div>
  <div><strong>Sample Terrain:</strong> ${(diag.sample_cell_types || []).join(', ') || 'none'}</div>
`;

      } catch (err) {
        document.getElementById('narrative').innerHTML = `<p>Error: ${err.message}</p>`;
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }
    
    document.getElementById('actionInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') submitAction();
    });

    // DeepSeek Debug Console Function
    async function askDeepSeek() {
      const question = document.getElementById('debugQuestion').value;
      const debugLevel = document.getElementById('debugLevel').value;
      
      if (!question) {
        alert('Please enter a question');
        return;
      }

      if (!currentSessionId) {
        alert('No active game session. Start a game first!');
        return;
      }

      const debugLoading = document.getElementById('debugLoading');
      const debugResponse = document.getElementById('debugResponse');
      
      debugLoading.style.display = 'block';
      debugResponse.style.display = 'none';
      debugResponse.innerHTML = '';

      try {
        console.log('[FRONTEND] Sending request to /ask-deepseek...');
        
        const response = await fetch('/ask-deepseek', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-session-id': currentSessionId
          },
          body: JSON.stringify({ question, debugLevel })
        });

        console.log('[FRONTEND] Response status:', response.status);
        const data = await response.json();
        console.log('[FRONTEND] Response data:', data);

        if (data.error) {
          const errorMsg = data.details ? JSON.stringify(data.details, null, 2) : data.message;
          debugResponse.innerHTML = `<strong style="color: #ff6b6b;">❌ ${data.error}:</strong><br>${errorMsg}`;
        } else if (data.response) {
          debugResponse.innerHTML = `
            <div style="margin-bottom: 10px; color: #4a90e2;"><strong>💭 DeepSeek Response:</strong></div>
            <div>${(data.response || '').replace(/\n/g, '<br>')}</div>
            <div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid #333; font-size: 11px; color: #666;">
              Debug Level: ${data.debugLevel} | Context: ${data.contextLength || 0} chars | ${data.timestamp}
            </div>
          `;
        } else {
          debugResponse.innerHTML = `<strong style="color: #ff6b6b;">⚠️ Unexpected response format</strong><br><pre style="font-size: 11px; overflow-x: auto;">${JSON.stringify(data, null, 2)}</pre>`;
        }
        
        debugResponse.style.display = 'block';
      } catch (err) {
        console.error('[FRONTEND] Fetch error:', err);
        debugResponse.innerHTML = `<strong style="color: #ff6b6b;">🔴 Network Error:</strong><br>${err.message}<br><br><small>Check browser console (F12) for details. DeepSeek API may be temporarily unavailable.</small>`;
        debugResponse.style.display = 'block';
      } finally {
        debugLoading.style.display = 'none';
      }
    }

    // Allow Enter key in debug question field
    document.getElementById('debugQuestion').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') askDeepSeek();
    });

    // Test Context Function (diagnose context building without calling DeepSeek)
    async function testContext() {
      const debugLevel = document.getElementById('debugLevel').value;
      
      if (!currentSessionId) {
        alert('No active game session. Start a game first!');
        return;
      }

      const debugLoading = document.getElementById('debugLoading');
      const debugResponse = document.getElementById('debugResponse');
      
      debugLoading.style.display = 'block';
      debugResponse.style.display = 'none';
      debugLoading.innerHTML = 'Building context...';

      try {
        console.log('[FRONTEND] Testing context build...');
        
        const response = await fetch('/test-context', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-session-id': currentSessionId
          },
          body: JSON.stringify({ debugLevel })
        });

        console.log('[FRONTEND] Context test status:', response.status);
        const data = await response.json();
        console.log('[FRONTEND] Context test response:', data);

        if (data.error) {
          debugResponse.innerHTML = `<strong style="color: #ff6b6b;">❌ ${data.error}:</strong><br>${data.message}`;
        } else if (data.success) {
          debugResponse.innerHTML = `
            <div style="color: #4ade80;"><strong>✅ Context Built Successfully!</strong></div>
            <div style="margin-top: 10px; font-size: 12px; color: #aaa;">
              <div><strong>Debug Level:</strong> ${data.debugLevel}</div>
              <div><strong>Context Size:</strong> ${data.contextLength} characters</div>
              <div style="margin-top: 10px; max-height: 300px; overflow-y: auto; background: #0a0a0a; padding: 10px; border: 1px solid #333; border-radius: 3px;">
                <pre style="margin: 0; white-space: pre-wrap; word-wrap: break-word; font-size: 11px; line-height: 1.4;">${data.context}</pre>
              </div>
            </div>
          `;
        }
        
        debugResponse.style.display = 'block';
      } catch (err) {
        console.error('[FRONTEND] Context test error:', err);
        debugResponse.innerHTML = `<strong style="color: #ff6b6b;">🔴 Network Error:</strong><br>${err.message}<br><br><small>DeepSeek API endpoint may be unavailable.</small>`;
        debugResponse.style.display = 'block';
      } finally {
        debugLoading.style.display = 'none';
      }
    }
  </script>
</body>
</html>
