<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map v0 — Truth Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      background: #0d0d0d;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #header {
      padding: 8px 12px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    #header h1 {
      font-size: 14px;
      color: #d4af37;
      letter-spacing: 1px;
    }

    #status-bar {
      font-size: 11px;
      color: #888;
    }

    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Map area ── */
    #map-area {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #map-notices {
      flex-shrink: 0;
      padding: 6px 12px 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #map-notice {
      font-size: 11px;
      color: #f39c12;
    }

    #map-viewport {
      flex: 1;
      overflow: hidden;
      position: relative;
      cursor: grab;
    }

    #map-viewport.dragging {
      cursor: grabbing;
    }

    #grid-container {
      display: inline-block;
      border: 1px solid #333;
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: 0 0;
      will-change: transform;
    }

    .grid-row {
      display: flex;
    }

    .cell {
      width: 64px;
      height: 52px;
      border: 1px solid #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      line-height: 1.3;
      text-align: center;
      padding: 2px;
      cursor: default;
      background: #111;
      color: #555;
      user-select: none;
      overflow: hidden;
    }

    .cell.generated {
      background: #1a1a2e;
      color: #c0c0c0;
      cursor: pointer;
      border-color: #2a2a4a;
    }

    .cell.generated:hover {
      background: #222244;
      border-color: #4a4a8a;
    }

    .cell.generated.selected {
      background: #1e3a1e;
      border-color: #2ecc71;
      color: #fff;
    }

    .cell.player-pos {
      background: #2a1a0a !important;
      border-color: #d4af37 !important;
      color: #d4af37 !important;
    }

    .cell.player-pos.selected {
      background: #3a2a0a !important;
    }

    .cell.unloaded {
      background: #0a0a0a;
      border-color: #1c1c1c;
      cursor: pointer;
    }

    .cell.unloaded:hover {
      background: #141414;
      border-color: #2a2a2a;
    }

    .cell-type {
      font-weight: bold;
      font-size: 9px;
      word-break: break-all;
    }

    .cell-biome {
      font-size: 8px;
      color: #888;
    }

    .cell.player-pos .cell-biome {
      color: #d4af37;
    }

    .cell-npc-badge {
      position: absolute;
      top: 2px;
      right: 2px;
      background: #b85c00;
      color: #fff;
      font-size: 7px;
      font-weight: bold;
      border-radius: 2px;
      padding: 0 2px;
      line-height: 10px;
      pointer-events: none;
    }

    .cell {
      position: relative;
    }

    .player-marker {
      font-size: 10px;
      line-height: 1;
    }

    /* ── Inspector ── */
    #inspector {
      width: 240px;
      flex-shrink: 0;
      border-left: 1px solid #333;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    /* ── World Tree ── */
    #tree-panel {
      width: 220px;
      flex-shrink: 0;
      border-left: 1px solid #333;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    #tree-header {
      padding: 8px 10px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      font-size: 11px;
      color: #888;
      font-weight: bold;
      letter-spacing: 1px;
      flex-shrink: 0;
    }

    #tree-content {
      padding: 8px 6px;
      font-size: 11px;
      font-family: monospace;
      line-height: 1.7;
      flex: 1;
      overflow-y: auto;
    }

    .tree-node {
      white-space: pre;
      cursor: default;
      padding: 0 2px;
      border-radius: 2px;
    }

    .tree-node.tree-active {
      color: #c8a84b;
      font-weight: bold;
    }

    .tree-node.tree-placeholder {
      color: #444;
      font-style: italic;
    }

    .tree-node.tree-toggle {
      cursor: pointer;
    }

    .tree-node.tree-toggle:hover {
      background: #1e1e1e;
    }

    #inspector-header {
      padding: 8px 10px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      font-size: 11px;
      color: #888;
      font-weight: bold;
      letter-spacing: 1px;
    }

    #inspector-content {
      padding: 10px;
      font-size: 11px;
      flex: 1;
    }

    .inspector-empty {
      color: #444;
      font-style: italic;
    }

    .inspector-field {
      margin-bottom: 8px;
    }

    .inspector-label {
      color: #888;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }

    .inspector-value {
      color: #e0e0e0;
      word-break: break-word;
    }

    .inspector-value.empty {
      color: #444;
      font-style: italic;
    }

    .inspector-value.site-present {
      color: #2ecc71;
      font-weight: bold;
    }

    .inspector-divider {
      border: none;
      border-top: 1px solid #222;
      margin: 10px 0;
    }

    #inspector-description {
      margin-top: 4px;
      color: #aaa;
      font-size: 10px;
      line-height: 1.5;
      font-style: italic;
    }

    /* ── Error / message overlays ── */
    #message-overlay {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    #message-overlay.visible {
      display: flex;
    }

    #message-box {
      background: #1a1a1a;
      border: 1px solid #555;
      padding: 20px 28px;
      max-width: 420px;
      text-align: center;
      font-size: 13px;
      line-height: 1.6;
      color: #e0e0e0;
    }

    #message-box.error {
      border-color: #e74c3c;
      color: #e74c3c;
    }

    #message-title {
      font-weight: bold;
      font-size: 13px;
      margin-bottom: 8px;
    }

    #message-body {
      font-size: 12px;
    }
    /* ── Worldgen Log Panel ── */
    #wglog-panel {
      position: absolute;
      top: 0; right: 0;
      width: 460px;
      max-height: 70vh;
      background: #111;
      border: 1px solid #444;
      border-top: none;
      z-index: 20;
      display: none;
      flex-direction: column;
      font-size: 11px;
      font-family: monospace;
    }
    #wglog-panel.visible { display: flex; }
    #wglog-copy-row {
      padding: 6px 10px;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1a1a1a;
      flex-shrink: 0;
    }
    #wglog-copy-btn {
      background: #283593; border: 1px solid #3949ab; color: #e0e0e0;
      font-family: monospace; font-size: 11px; padding: 2px 10px;
      cursor: pointer; letter-spacing: 0.5px;
    }
    #wglog-copy-btn:hover { background: #3949ab; }
    #wglog-label { color: #888; font-size: 10px; }
    #wglog-entries {
      overflow-y: auto;
      flex: 1;
      padding: 6px 10px;
    }
    .wglog-entry {
      display: flex; gap: 8px; align-items: baseline;
      padding: 2px 0;
      border-bottom: 1px solid #1c1c1c;
      color: #c0c0c0;
    }
    .wglog-ms   { color: #666; min-width: 48px; text-align: right; flex-shrink: 0; }
    .wglog-pass { color: #f39c12; min-width: 60px; flex-shrink: 0; }
    .wglog-step { color: #7ecbff; min-width: 140px; flex-shrink: 0; }
    .wglog-data { color: #888; word-break: break-all; font-size: 10px; }
  </style>
</head>
<body>

  <div id="header">
    <h1>MAP v0 — TRUTH VIEWER</h1>
    <div style="display:flex; align-items:center; gap:12px;">
      <button id="wglog-btn" onclick="toggleWgLog()" style="
        background:#222; border:1px solid #555; color:#e0e0e0;
        font-family:monospace; font-size:11px; padding:3px 10px;
        cursor:pointer; letter-spacing:0.5px;
      ">WORLDGEN LOG</button>
      <button id="overlay-btn" onclick="toggleOverlay()" style="
        background:#222; border:1px solid #555; color:#e0e0e0;
        font-family:monospace; font-size:11px; padding:3px 10px;
        cursor:pointer; letter-spacing:0.5px;
      ">Overlay: TERRAIN</button>
      <span id="status-bar">Initializing...</span>
    </div>
  </div>

  <div id="wglog-panel">
    <div id="wglog-copy-row">
      <button id="wglog-copy-btn" onclick="copyWgLog()">Copy Log JSON</button>
      <span id="wglog-label">No worldgen log yet — open game and play Turn 1</span>
    </div>
    <div id="wglog-entries"></div>
  </div>

  <div id="main" style="position: relative;">
    <div id="map-area">
      <div id="map-notices">
        <div id="site-banner" style="display:none; padding:6px 10px; background:#1a2a1a; border:1px solid #2e7d32; color:#81c784; font-size:12px; font-weight:bold; letter-spacing:0.5px;"></div>
        <div id="map-notice" style="display:none;"></div>
      </div>
      <div id="map-viewport">
        <div id="grid-container"></div>
      </div>
    </div>

    <div id="tree-panel">
      <div id="tree-header">WORLD TREE</div>
      <div id="tree-content"><span class="tree-node tree-placeholder">Waiting for data...</span></div>
    </div>

    <div id="inspector">
      <div id="inspector-header">INSPECTOR</div>
      <div id="inspector-content">
        <span class="inspector-empty">Click a generated cell to inspect.</span>
      </div>
    </div>

    <div id="message-overlay">
      <div id="message-box">
        <div id="message-title"></div>
        <div id="message-body"></div>
      </div>
    </div>
  </div>

  <script>
    // ── Constants ──────────────────────────────────────────────────────────────
    const POLL_INTERVAL_MS = 500;
    const MIN_SCALE = 0.05;  // practical floor — full 128×128 grid fits viewport at first open
    const MAX_SCALE = 3.0;   // ~3 cells filling the viewport at max zoom
    const FIT_PADDING = 24;  // px margin each side when fitting grid to viewport

    // ── State ──────────────────────────────────────────────────────────────────
    let lastRenderedTurnCounter = -1;
    let selectedCell = null;
    // Track which region was last centered so we only center once per region entry
    let lastCenteredRegionKey = null;
    // World grid dimensions — updated in render(); used by clampPan() and RAF fit block
    let _worldGridW = 128;
    let _worldGridH = 128;

    // ── Overlay mode ──────────────────────────────────────────────────────────
    // 'terrain' = default dark-blue for generated cells (no color table yet — Pass 2)
    // 'elevation' = grayscale heatmap from cell.elevation [0,1]
    // 'moisture'  = blue-tint heatmap from cell.moisture [0,1]
    let mapOverlay = 'terrain';
    const OVERLAY_SEQUENCE = ['terrain', 'elevation', 'moisture'];
    const OVERLAY_LABELS   = { terrain: 'TERRAIN', elevation: 'ELEVATION', moisture: 'MOISTURE' };

    // ── Terrain type → hex color (used in terrain overlay mode) ──────────────
    const TERRAIN_COLORS = {
      // open
      plains_grassland: '#6ab04c', plains_wildflower: '#a3cb38', meadow: '#78e08f',
      hills_rolling:    '#4c9e3c', scrubland:         '#95a94a',
      // forest
      forest_deciduous: '#218c3b', forest_coniferous: '#1a5c2c', forest_mixed: '#2d7a46',
      // rugged
      hills_rocky:      '#7f8c8d', mountain_slopes:   '#8c7853', mountain_peak: '#bdc3c7',
      mountain_pass:    '#a0896d', rocky_terrain:     '#786450', scree:         '#9e8870',
      alpine:           '#d0c8c0',
      // arid
      desert_sand:      '#f9ca24', desert_dunes:      '#f0932b', desert_rocky:  '#c6862c',
      badlands:         '#c0392b', canyon:            '#a93226', mesa:          '#b85c38',
      // cold
      tundra:           '#74b9ff', snowfield:         '#dfe6e9', ice_sheet:     '#a0c4d4',
      permafrost:       '#6c8c9a',
      // wetland
      swamp:            '#2d4c2d', marsh:             '#3d6040', wetland:       '#4a705a',
      bog:              '#3a4c30',
      // water
      river_crossing:   '#2980b9', stream:            '#54a0ff', lake_shore:    '#74b9ff',
      waterfall:        '#0652dd', spring:            '#12cbc4',
      // coast
      beach_sand:       '#f7d794', beach_pebble:      '#c0a882', cliffs_coastal: '#7f8c8d',
      tidepools:        '#00b894', dunes_coastal:     '#fad390',
    };

    function toggleOverlay() {
      const idx = OVERLAY_SEQUENCE.indexOf(mapOverlay);
      mapOverlay = OVERLAY_SEQUENCE[(idx + 1) % OVERLAY_SEQUENCE.length];
      document.getElementById('overlay-btn').textContent = `Overlay: ${OVERLAY_LABELS[mapOverlay]}`;
      recolorCells();
    }

    // Returns the CSS background-color string for a generated cell given current overlay mode.
    // cellEl must have data-elevation, data-moisture, and data-type attributes written at render time.
    function cellOverlayColor(elevation, moisture, terrainType) {
      if (mapOverlay === 'elevation') {
        if (elevation == null) return '#3a0a0a'; // missing data — explicit red-tint
        const L = Math.round(elevation * 100);
        return `hsl(0,0%,${L}%)`;
      }
      if (mapOverlay === 'moisture') {
        if (moisture == null) return '#3a0a0a'; // missing data — explicit red-tint
        const L = Math.round(moisture * 80); // 0–80% lightness on blue hue
        return `hsl(210,60%,${L}%)`;
      }
      // terrain mode — use TERRAIN_COLORS lookup, fall back to dark blue
      return TERRAIN_COLORS[terrainType] || '#1a1a2e';
    }

    // Re-colors all existing generated cell DOM elements without re-rendering the grid.
    function recolorCells() {
      const cells = document.querySelectorAll('.cell.generated');
      for (const el of cells) {
        const elevation   = el.dataset.elevation != null ? parseFloat(el.dataset.elevation) : null;
        const moisture    = el.dataset.moisture  != null ? parseFloat(el.dataset.moisture)  : null;
        const terrainType = el.dataset.type || null;
        el.style.backgroundColor = cellOverlayColor(elevation, moisture, terrainType);
      }
    }

    // ── Zoom / Pan state ───────────────────────────────────────────────────────
    let vpScale = 1.0;
    let vpX = 0;
    let vpY = 0;
    let isDragging = false;
    let wasDragged = false;   // distinguishes drag from click
    let dragStartX, dragStartY, dragStartVpX, dragStartVpY;

    function applyTransform() {
      // Crash guard only — fit initializer may legitimately use scales below MIN_SCALE
      if (!isFinite(vpScale) || vpScale <= 0) vpScale = 1;
      document.getElementById('grid-container').style.transform =
        `translate(${vpX}px, ${vpY}px) scale(${vpScale})`;
    }

    // Hard pan clamp — prevents panning outside the world grid.
    // When the scaled world is smaller than the viewport, the world is centered.
    // When larger, the viewport is hard-stopped at world edges.
    function clampPan() {
      const vp = document.getElementById('map-viewport');
      const vpRect = vp.getBoundingClientRect();
      const _cellPxW = 65; const _cellPxH = 53;
      const scaledW = _worldGridW * _cellPxW * vpScale;
      const scaledH = _worldGridH * _cellPxH * vpScale;
      if (scaledW <= vpRect.width)  { vpX = (vpRect.width  - scaledW) / 2; }
      else { vpX = Math.min(0, Math.max(vpX, vpRect.width  - scaledW)); }
      if (scaledH <= vpRect.height) { vpY = (vpRect.height - scaledH) / 2; }
      else { vpY = Math.min(0, Math.max(vpY, vpRect.height - scaledH)); }
    }

    // ── Overlay helpers ────────────────────────────────────────────────────────
    function showError(title, body) {
      const overlay = document.getElementById('message-overlay');
      const box = document.getElementById('message-box');
      box.className = 'error';
      document.getElementById('message-title').textContent = title;
      document.getElementById('message-body').textContent = body;
      overlay.classList.add('visible');
    }

    function hideOverlay() {
      document.getElementById('message-overlay').classList.remove('visible');
    }

    function setStatus(text) {
      document.getElementById('status-bar').textContent = text;
    }

    // ── State access ───────────────────────────────────────────────────────────
    // lastGameResponse is the sole confirmed canonical in-memory frontend state.
    // It is declared in Index.html and assigned after every /narrate response.
    // Returns { ok: true, state } on success, or { ok: false, reason } on failure.
    function getState() {
      try {
        const opener = window.opener;
        if (!opener) return { ok: false, reason: 'no_opener' };
        const resp = opener.lastGameResponse;
        if (!resp) return { ok: false, reason: 'no_response' };
        const state = resp.state;
        if (!state) return { ok: false, reason: 'no_state' };
        return { ok: true, state, visibility: resp.visibility || null };
      } catch (e) {
        // Thrown when opener access is blocked (e.g. cross-origin or closed window)
        return { ok: false, reason: 'cross_origin' };
      }
    }

    // ── Key parsing ────────────────────────────────────────────────────────────
    // Expected format: LOC:${mx},${my}:${lx},${ly}
    function parseL1Key(key) {
      const m = key.match(/^LOC:(\d+),(\d+):(\d+),(\d+)$/);
      if (!m) return null;
      return {
        mx: parseInt(m[1], 10),
        my: parseInt(m[2], 10),
        lx: parseInt(m[3], 10),
        ly: parseInt(m[4], 10)
      };
    }

    // ── Rendering ──────────────────────────────────────────────────────────────
    function render(state, visibility) {
      // Site banner — show when inside a site (L1+)
      const _siteBanner = document.getElementById('site-banner');
      if (visibility && visibility.current_depth >= 2 && visibility.active_site_name) {
        if (visibility.current_depth === 3 && visibility.container?.kind === 'local_space') {
          const _lsName = visibility.container.name || '(unnamed)';
          _siteBanner.textContent = `▶ IN LOCAL SPACE: ${_lsName} (L2)`;
        } else {
          const _bannerLayer = { 2: 'L1', 3: 'L2', 4: 'L3' }[visibility.current_depth] || `L${visibility.current_depth}`;
          let _bannerTxt = `▶ INSIDE: ${visibility.active_site_name} (${_bannerLayer})`;
          // List local spaces from the active site if generated
          const _activeSite = (visibility.sites || []).find(s => s.entered === true);
          if (_activeSite && _activeSite.local_spaces && _activeSite.local_spaces.length > 0) {
            const _bldNames = _activeSite.local_spaces.map(b => b.name || b.local_space_id).join(', ');
            _bannerTxt += `  ·  Places: ${_bldNames}`;
          }
          _siteBanner.textContent = _bannerTxt;
        }
        _siteBanner.style.display = 'block';
      } else {
        _siteBanner.style.display = 'none';
      }
      // ── L2 local space grid branch ─────────────────────────────────────────
      // At depth=3: render active_local_space.grid. Null-safe — shows error if not yet populated (WS3 pending).
      if (visibility && visibility.current_depth === 3) {
        const _activeLSData = state.world && state.world.active_local_space;
        if (!_activeLSData || !_activeLSData.grid || !Array.isArray(_activeLSData.grid) || _activeLSData.grid.length === 0) {
          showError('L2 Grid Unavailable', 'Local space interior grid not available. Local space entry not yet wired (WS3 pending).');
          return;
        }
        const _lsPos = visibility.local_space_position;
        if (!_lsPos || typeof _lsPos.x !== 'number' || typeof _lsPos.y !== 'number') {
          showError('L2 Grid Unavailable', 'Local-space player position is missing from state.');
          return;
        }
        const _lsGrid = _activeLSData.grid;
        const _lsH = _activeLSData.height || _lsGrid.length;
        const _lsW = _activeLSData.width || (_lsGrid[0] ? _lsGrid[0].length : 5);
        document.getElementById('map-notice').style.display = 'none';
        hideOverlay();
        const container = document.getElementById('grid-container');
        container.innerHTML = '';
        for (let row = 0; row < _lsH; row++) {
          const rowEl = document.createElement('div');
          rowEl.className = 'grid-row';
          for (let col = 0; col < _lsW; col++) {
            const tile = (_lsGrid[row] && _lsGrid[row][col]) || null;
            const isPlayer = (col === _lsPos.x && row === _lsPos.y);
            const el = document.createElement('div');
            el.className = 'cell generated';
            if (isPlayer) el.classList.add('player-pos');
            const typeLabel = tile?.type || 'space';
            const _tileNpcIds = tile?.npc_ids || [];
            const _tileNpcCount = _tileNpcIds.length;
            el.innerHTML = `
              ${isPlayer ? '<div class="player-marker">&#x25C9;</div>' : ''}
              <div class="cell-type">${escapeHtml(typeLabel)}</div>
              <div class="cell-biome">${escapeHtml(String(col) + ',' + String(row))}</div>
              ${_tileNpcCount > 0 ? `<div class="cell-npc-badge">${_tileNpcCount}</div>` : ''}
            `;
            rowEl.appendChild(el);
          }
          container.appendChild(rowEl);
        }
        setStatus(`Local space: ${_activeLSData.name || '(unnamed)'} · L2 grid ${_lsW}×${_lsH} · pos (${_lsPos.x},${_lsPos.y})`);
        return;
      }
      // ── L1 site grid branch ────────────────────────────────────────────────
      // When inside a site (depth ≥ 2), render the site interior grid instead of
      // the L0 world grid. Falls back to explicit error — never silently shows L0.
      if (visibility && visibility.current_depth >= 2) {
        const _activeSiteData = state.world && state.world.active_site;
        const _sitePos = visibility.site_position;

        if (!_activeSiteData || !_activeSiteData.grid || !Array.isArray(_activeSiteData.grid) || _activeSiteData.grid.length === 0) {
          showError('L1 Grid Unavailable', 'Site interior grid has not been generated yet. Enter the site first.');
          return;
        }
        if (!_sitePos || typeof _sitePos.x !== 'number' || typeof _sitePos.y !== 'number') {
          showError('L1 Grid Unavailable', 'Site-local player position is missing from state.');
          return;
        }

        const _siteGrid = _activeSiteData.grid;
        const _siteH = _activeSiteData.height || _siteGrid.length;
        const _siteW = _activeSiteData.width || (_siteGrid[0] ? _siteGrid[0].length : 7);

        document.getElementById('map-notice').style.display = 'none';
        hideOverlay();

        const container = document.getElementById('grid-container');
        container.innerHTML = '';

        for (let row = 0; row < _siteH; row++) {
          const rowEl = document.createElement('div');
          rowEl.className = 'grid-row';
          for (let col = 0; col < _siteW; col++) {
            const tile = (_siteGrid[row] && _siteGrid[row][col]) || null;
            const isPlayer = (col === _sitePos.x && row === _sitePos.y);
            const el = document.createElement('div');
            el.className = 'cell generated';
            if (isPlayer) el.classList.add('player-pos');
            const typeLabel = tile?.type || 'space';

            // Resolve NPC count for this tile from authoritative source
            // Street tiles: npc_ids on the tile itself
            // Local space tiles: npc_ids on site.local_spaces[local_space_id]
            let _tileNpcIds = [];
            if (tile?.type === 'local_space' && tile?.local_space_id) {
              _tileNpcIds = _activeSiteData.local_spaces?.[tile.local_space_id]?.npc_ids || [];
            } else {
              _tileNpcIds = tile?.npc_ids || [];
            }
            const _tileNpcCount = _tileNpcIds.length;

            el.innerHTML = `
              ${isPlayer ? '<div class="player-marker">&#x25C9;</div>' : ''}
              <div class="cell-type">${escapeHtml(typeLabel)}</div>
              <div class="cell-biome">${escapeHtml(String(col) + ',' + String(row))}</div>
              ${_tileNpcCount > 0 ? `<div class="cell-npc-badge">${_tileNpcCount}</div>` : ''}
            `;
            el.addEventListener('click', () => {
              if (selectedCell) selectedCell.classList.remove('selected');
              el.classList.add('selected');
              selectedCell = el;
              const content = document.getElementById('inspector-content');
              let _iHtml = '';

              // Type + coordinates
              _iHtml += `<div class="inspector-field"><div class="inspector-label">Type</div><div class="inspector-value">${escapeHtml(typeLabel)}</div></div>`;
              _iHtml += `<div class="inspector-field"><div class="inspector-label">x</div><div class="inspector-value">${col}</div></div>`;
              _iHtml += `<div class="inspector-field"><div class="inspector-label">y</div><div class="inspector-value">${row}</div></div>`;

              // Local space identity (authoritative from site.local_spaces)
              if (tile?.type === 'local_space' && tile?.local_space_id) {
                const _bld = _activeSiteData.local_spaces?.[tile.local_space_id];
                const _bldName = _bld?.name || '(unnamed)';
                const _bldPurpose = _bld?.purpose || '(unknown)';
                _iHtml += `<hr class="inspector-divider">`;
                _iHtml += `<div class="inspector-field"><div class="inspector-label">Local Space</div><div class="inspector-value">${escapeHtml(_bldName)}</div></div>`;
                _iHtml += `<div class="inspector-field"><div class="inspector-label">Purpose</div><div class="inspector-value">${escapeHtml(_bldPurpose)}</div></div>`;
              }

              // NPC identity (resolve ids against site.npcs)
              if (_tileNpcCount > 0) {
                const _tileNpcRecords = (_activeSiteData.npcs || []).filter(n => _tileNpcIds.includes(n.id));
                const _tileNpcLabels = _tileNpcRecords.map(n => n.job_category || n.id).filter(Boolean);
                _iHtml += `<hr class="inspector-divider">`;
                _iHtml += `<div class="inspector-field"><div class="inspector-label">NPCs</div><div class="inspector-value">${_tileNpcCount} — ${escapeHtml(_tileNpcLabels.join(', ') || '(id only)')}</div></div>`;
              } else {
                _iHtml += `<div class="inspector-field"><div class="inspector-label">NPCs</div><div class="inspector-value empty">(none)</div></div>`;
              }

              content.innerHTML = _iHtml;
              document.getElementById('inspector-panel').style.display = 'block';
            });
            rowEl.appendChild(el);
          }
          container.appendChild(rowEl);
        }

        setStatus(`Site: ${_activeSiteData.name || '(unnamed)'} · L1 grid ${_siteW}×${_siteH} · pos (${_sitePos.x},${_sitePos.y})`);
        return;
      }
      // ── end L1 branch — L0 path continues below ────────────────────────────

      const pos = state.world && state.world.position;
      if (!pos) {
        showError('State Error', 'world.position is absent in game state.');
        return;
      }

      const { mx, my, lx: playerLx, ly: playerLy } = pos;
      const allCells = (state.world && state.world.cells) || {};
      const prefix = `LOC:${mx},${my}:`;

      // Filter cells for current MAC macro region
      const regionEntries = Object.entries(allCells).filter(([k]) => k.startsWith(prefix));

      if (regionEntries.length === 0) {
        hideOverlay();
        document.getElementById('grid-container').innerHTML = '';
        document.getElementById('map-notice').style.display = 'block';
        document.getElementById('map-notice').textContent = 'No cells generated for current region yet.';
        setStatus(`Region (${mx},${my}) — no cells`);
        return;
      }

      document.getElementById('map-notice').style.display = 'none';

      // Determine grid bounds
      const l1Default = state.world && state.world.l1_default;
      let gridW, gridH, dimensionNotice;

      if (l1Default && typeof l1Default.w === 'number' && typeof l1Default.h === 'number') {
        gridW = l1Default.w;
        gridH = l1Default.h;
        dimensionNotice = null;
        _worldGridW = gridW; _worldGridH = gridH; // update module-level for clampPan()
      } else {
        // No configured dimensions — derive tight bounding box from actual cell coords only
        let minLx = Infinity, maxLx = -Infinity, minLy = Infinity, maxLy = -Infinity;
        for (const [k] of regionEntries) {
          const parsed = parseL1Key(k);
          if (!parsed) continue;
          if (parsed.lx < minLx) minLx = parsed.lx;
          if (parsed.lx > maxLx) maxLx = parsed.lx;
          if (parsed.ly < minLy) minLy = parsed.ly;
          if (parsed.ly > maxLy) maxLy = parsed.ly;
        }
        if (minLx === Infinity) {
          showError('Render Error', 'Could not parse cell coordinates from region keys.');
          return;
        }
        // Tight bounding box: offset grid starts at (minLx, minLy)
        gridW = maxLx - minLx + 1;
        gridH = maxLy - minLy + 1;
        _worldGridW = gridW; _worldGridH = gridH; // update module-level for clampPan()
        dimensionNotice = `Region dimensions unavailable — showing known generated cells only.`;
      }

      // Build lookup map: "lx,ly" → cell data
      const cellMap = {};
      for (const [k, cell] of regionEntries) {
        const parsed = parseL1Key(k);
        if (!parsed) continue;
        cellMap[`${parsed.lx},${parsed.ly}`] = cell;
      }

      // Compute lx/ly min offset for tight-bound mode
      const lxOffset = (dimensionNotice != null)
        ? Math.min(...regionEntries.map(([k]) => { const p = parseL1Key(k); return p ? p.lx : Infinity; }))
        : 0;
      const lyOffset = (dimensionNotice != null)
        ? Math.min(...regionEntries.map(([k]) => { const p = parseL1Key(k); return p ? p.ly : Infinity; }))
        : 0;

      // Sites interior registry lookup
      const sites = state.world?.sites || null;

      // Render grid
      const container = document.getElementById('grid-container');
      container.innerHTML = '';

      for (let row = 0; row < gridH; row++) {
        const ly = lyOffset + row;
        const rowEl = document.createElement('div');
        rowEl.className = 'grid-row';

        for (let col = 0; col < gridW; col++) {
          const lx = lxOffset + col;
          const key = `${lx},${ly}`;
          const cellData = cellMap[key] || null;
          const isPlayer = (lx === playerLx && ly === playerLy);

          const el = document.createElement('div');
          el.className = 'cell';
          if (cellData) el.classList.add('generated');
          if (isPlayer) el.classList.add('player-pos');
          if (!cellData) {
            el.classList.add('unloaded');
            el.addEventListener('click', () => showUnloadedInspector(lx, ly));
          }

          if (cellData) {
            const typeLabel = cellData.type || '?';
            const biomeLabel = cellData.biome || '—';
            const _elev = cellData.elevation != null ? cellData.elevation : null;
            const _mois = cellData.moisture  != null ? cellData.moisture  : null;

            // Store noise values as data attributes for recolorCells() re-pass
            if (_elev != null) el.dataset.elevation = _elev.toFixed(4);
            if (_mois != null) el.dataset.moisture  = _mois.toFixed(4);
            el.dataset.type = cellData.type || '';

            // Apply overlay color immediately
            el.style.backgroundColor = cellOverlayColor(_elev, _mois, cellData.type);

            el.innerHTML = `
              ${isPlayer ? '<div class="player-marker">◉</div>' : ''}
              <div class="cell-type">${escapeHtml(typeLabel)}</div>
              <div class="cell-biome">${escapeHtml(biomeLabel)}</div>
            `;

            el.addEventListener('click', () => {
              // Deselect previous
              if (selectedCell) selectedCell.classList.remove('selected');
              el.classList.add('selected');
              selectedCell = el;
              showInspector(cellData, mx, my, lx, ly, sites);
              renderTreeForCell(cellData, sites, lx, ly);
            });
          } else if (isPlayer) {
            // Player is on an un-generated cell (edge case)
            el.innerHTML = '<div class="player-marker">◉</div>';
          }

          rowEl.appendChild(el);
        }

        container.appendChild(rowEl);
      }

      // Notice for tight-bound mode
      const noticeEl = document.getElementById('map-notice');
      if (dimensionNotice) {
        noticeEl.style.display = 'block';
        noticeEl.textContent = dimensionNotice;
      } else {
        noticeEl.style.display = 'none';
      }

      hideOverlay();
      setStatus(`Region (${mx},${my}) · ${regionEntries.length} cells in region · Turn ${state.turn_counter ?? '?'}`);
      // Fit-to-viewport + center once per region entry. User can pan/zoom freely after.
      const regionKey = `${mx},${my}`;
      requestAnimationFrame(() => {
        if (regionKey !== lastCenteredRegionKey) {
          lastCenteredRegionKey = regionKey;
          // Reset to identity before measuring.
          vpScale = 1; vpX = 0; vpY = 0;
          applyTransform();
          const vp = document.getElementById('map-viewport');
          const vpRect = vp.getBoundingClientRect();
          // Fit to the full theoretical grid (gridW × gridH), not just generated cells.
          // This gives a truthful view of the entire world from first open.
          const _cellPxW = 65; // 64px width + 1px right border
          const _cellPxH = 53; // 52px height + 1px bottom border
          const _fullPxW = _worldGridW * _cellPxW;
          const _fullPxH = _worldGridH * _cellPxH;
          const scaleX = (vpRect.width  - FIT_PADDING * 2) / _fullPxW;
          const scaleY = (vpRect.height - FIT_PADDING * 2) / _fullPxH;
          vpScale = Math.max(Math.min(scaleX, scaleY), 0.005); // safety floor, not MIN_SCALE
          // Center the full world grid in the viewport
          vpX = (vpRect.width  - _fullPxW * vpScale) / 2;
          vpY = (vpRect.height - _fullPxH * vpScale) / 2;
          applyTransform();
          clampPan();
          applyTransform();
        }
      });
    }

    // ── Inspector ──────────────────────────────────────────────────────────────
    function showInspector(cell, mx, my, lx, ly, sites) {
      const content = document.getElementById('inspector-content');

      // Site presence: check sites object for any key matching this cell's coordinates
      let siteText = null;
      if (sites === null) {
        siteText = null; // unavailable
      } else {
        // Look for any site at this exact mx/my/lx/ly
        const present = Object.values(sites).some(s => {
          if (!s) return false;
          // Check position fields (may vary): s.lx, s.ly, s.mx, s.my or s.position.*
          const pos = s.position || s;
          return pos.mx === mx && pos.my === my && pos.lx === lx && pos.ly === ly;
        });
        siteText = present ? 'YES' : 'no';
      }

      const fields = [
        { label: 'Type',        value: cell.type    || '' },
        { label: 'Subtype',     value: cell.subtype  || '' },
        { label: 'Biome',       value: cell.biome    || '' },
        { label: 'mx',          value: String(mx) },
        { label: 'my',          value: String(my) },
        { label: 'lx',          value: String(lx) },
        { label: 'ly',          value: String(ly) },
        // Pass 1 noise fields — shown as 2-decimal floats; explicit if absent (pre-Pass1 cells)
        { label: 'Elevation',    value: cell.elevation   != null ? cell.elevation.toFixed(2)   : null },
        { label: 'Moisture',     value: cell.moisture    != null ? cell.moisture.toFixed(2)    : null },
        { label: 'Temperature',  value: cell.temperature != null ? cell.temperature.toFixed(2) : null },
      ];

      let html = '';
      for (const f of fields) {
        // null  → field absent from cell (pre-Pass1); '' → field present but empty
        const isMissing = f.value === null;
        const isEmpty   = f.value === '';
        const valueClass = (isMissing || isEmpty) ? 'inspector-value empty' : 'inspector-value';
        const display = isMissing ? '(not computed)' : isEmpty ? '(empty)' : escapeHtml(f.value);
        html += `
          <div class="inspector-field">
            <div class="inspector-label">${f.label}</div>
            <div class="${valueClass}">${display}</div>
          </div>`;
      }

      // Site
      if (siteText !== null) {
        const cls = siteText === 'YES' ? 'inspector-value site-present' : 'inspector-value';
        html += `
          <div class="inspector-field">
            <div class="inspector-label">Site</div>
            <div class="${cls}">${siteText}</div>
          </div>`;
      } else {
        html += `
          <div class="inspector-field">
            <div class="inspector-label">Site</div>
            <div class="inspector-value empty">(unavailable)</div>
          </div>`;
      }

      // NPC Records — authoritative count from sites registry
      if (sites !== null && cell.sites) {
        let totalNpcs = 0;
        let siteFound = false;
        for (const siteRef of Object.values(cell.sites)) {
          if (!siteRef || !siteRef.interior_key) continue;
          const fullSite = sites[siteRef.interior_key];
          if (!fullSite) continue;
          siteFound = true;
          totalNpcs += Array.isArray(fullSite.npcs) ? fullSite.npcs.length : 0;
        }
        if (siteFound) {
          html += `
          <div class="inspector-field">
            <div class="inspector-label">NPC Records</div>
            <div class="inspector-value">${totalNpcs}</div>
          </div>`;
        }
      }

      // Description (supplemental)
      if (cell.description) {
        html += `<hr class="inspector-divider">
          <div class="inspector-label">Description</div>
          <div id="inspector-description">${escapeHtml(cell.description)}</div>`;
      }

      content.innerHTML = html;
    }

    function showUnloadedInspector(lx, ly) {
      const content = document.getElementById('inspector-content');
      content.innerHTML = `
        <div class="inspector-field">
          <div class="inspector-label">Status</div>
          <div class="inspector-value empty">UNLOADED</div>
        </div>
        <div class="inspector-field">
          <div class="inspector-label">lx</div>
          <div class="inspector-value">${lx}</div>
        </div>
        <div class="inspector-field">
          <div class="inspector-label">ly</div>
          <div class="inspector-value">${ly}</div>
        </div>
        <hr class="inspector-divider">
        <div style="font-size:10px; color:#444;">Cell not currently loaded in memory</div>
      `;
    }

    // ── Utility ────────────────────────────────────────────────────────────────
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Poll loop ──────────────────────────────────────────────────────────────
    // Minimal v0 sync: polls window.opener.lastGameResponse every 500ms.
    // Chosen as the smallest safe mechanism for same-origin opener access.
    const DIAG_MESSAGES = {
      no_opener:    { title: 'Map Source Unavailable', body: 'No opener window detected. Open this map using the \uD83D\uDDFA\uFE0F Open Map button from the game window.' },
      no_response:  { title: 'Map Source Unavailable', body: 'Opener found, but lastGameResponse is undefined. Play at least one turn first.' },
      no_state:     { title: 'Map Source Unavailable', body: 'lastGameResponse found, but state is missing. The server response may be malformed.' },
      cross_origin: { title: 'Origin Error',           body: 'Cross-origin access blocked. Map.html must be served from the same origin as the game (e.g. http://localhost:3000/Map.html). Do not open it as a file:// URL.' },
    };

    // ── Tree state ─────────────────────────────────────────────────────────────
    // collapseState[key] = true (collapsed) | false (expanded) | undefined (default: collapsed)
    let collapseState = {};

    function _treeEsc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function toggleNode(key) {
      // true = collapsed, false = expanded; undefined defaults to collapsed
      const wasCollapsed = collapseState[key] !== false;
      collapseState[key] = !wasCollapsed; // flip: collapsed->expanded, expanded->collapsed
      const result = getState();
      if (result.ok) renderTree(result.visibility);
    }

    function renderTree(visibility) {
      const content = document.getElementById('tree-content');
      if (!visibility) {
        content.innerHTML = '<div class="tree-node tree-placeholder">(no visibility data)</div>';
        return;
      }

      const depth = visibility.current_depth || 1;
      const c = visibility.container || {};
      const sites = visibility.sites || [];
      let html = '';

      // ── L0 node (always rendered, always root) ──────────────────────────────
      const l0Active = depth === 1;
      const l0Key = c.grid_key || '?';
      const l0Type = c.cell_type || '?';
      const l0Biome = c.biome || '?';
      html += `<div class="tree-node${l0Active ? ' tree-active' : ''}">[L0] ${_treeEsc(l0Type)} &middot; ${_treeEsc(l0Biome)}</div>`;

      // ── L1 nodes (sites) ────────────────────────────────────────────────────
      if (sites.length === 0) {
        html += '<div class="tree-node tree-placeholder">&nbsp;&nbsp;(no sites)</div>';
      } else {
        for (const site of sites) {
          const siteKey = 'site:' + site.site_id;
          const expanded = collapseState[siteKey] === false;
          const toggle = expanded ? '&#9660;' : '&#9654;';
          const siteName = _treeEsc(site.name || '(unnamed)');
          const enteredMark = site.entered ? ' &bull;' : '';
          const isSiteActive = depth >= 2 && site.entered;
          html += `<div class="tree-node tree-toggle${isSiteActive ? ' tree-active' : ''}" onclick="toggleNode('${_treeEsc(siteKey)}')">&nbsp;&nbsp;${toggle} [${_treeEsc(site.identity ? site.identity.slice(0, 25) : '(unfilled)')}] ${siteName}${enteredMark}</div>`;

          if (expanded) {
            // ── L2 nodes (local spaces) ────────────────────────────────────────────────────
            if (!site.generated) {
              html += '<div class="tree-node tree-placeholder">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;(not generated)</div>';
            } else if (!site.local_spaces || site.local_spaces.length === 0) {
              html += '<div class="tree-node tree-placeholder">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;(no places)</div>';
            } else {
              for (const bld of site.local_spaces) {
                const bldKey = 'ls:' + site.site_id + '/' + bld.local_space_id;
                const bldExpanded = collapseState[bldKey] === false;
                const bldToggle = bldExpanded ? '&#9660;' : '&#9654;';
                const bldLabel = _treeEsc((bld.name || '(unnamed)') + ' (' + (bld.purpose || '?') + ')');
                const isBldActive = bld.active === true;
                html += `<div class="tree-node tree-toggle${isBldActive ? ' tree-active' : ''}" onclick="toggleNode('${_treeEsc(bldKey)}')">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;${bldToggle} ${bldLabel}</div>`;

                if (bldExpanded) {
                  // ── L3 node (always structural placeholder) ───────────────
                  html += '<div class="tree-node tree-placeholder">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;(not implemented)</div>';
                }
              }
            }
          }
        }
      }

      content.innerHTML = html;
    }

    // Renders tree from a specific clicked cell's sites rather than the player's cell.
    // Called from the L0 cell click handler; reverts to player cell on next poll.
    function renderTreeForCell(cellData, allSites, lx, ly) {
      const content = document.getElementById('tree-content');
      if (!cellData) return;
      const cellSiteRefs = cellData.sites ? Object.values(cellData.sites) : [];
      if (!cellSiteRefs.length) {
        content.innerHTML = `<div class="tree-node">[L0] ${_treeEsc(cellData.type || '?')} &middot; ${_treeEsc(cellData.biome || '?')}</div><div class="tree-node tree-placeholder">&nbsp;&nbsp;(no sites)</div>`;
        return;
      }
      const sitesArr = cellSiteRefs.map(ref => {
        const fullSite = allSites && ref.interior_key ? allSites[ref.interior_key] : null;
        const lsArr = fullSite && fullSite.local_spaces
          ? Object.values(fullSite.local_spaces).map(ls => ({ local_space_id: ls.local_space_id || ls.id, name: ls.name, purpose: ls.purpose }))
          : [];
        return {
          site_id: ref.site_id || ref.interior_key || '?',
          name: (fullSite && fullSite.name) || ref.name || '(unnamed)',
          identity: (fullSite && fullSite.identity) || ref.identity || null,
          entered: false,
          generated: !!(fullSite && fullSite.grid),
          local_spaces: lsArr
        };
      });
      renderTree({ current_depth: 1, container: { cell_type: cellData.type, biome: cellData.biome, grid_key: `${lx},${ly}` }, sites: sitesArr });
    }

    function poll() {
      const result = getState();

      if (!result.ok) {
        const msg = DIAG_MESSAGES[result.reason] || { title: 'Map Source Unavailable', body: 'Unknown connection error.' };
        showError(msg.title, msg.body);
        setStatus('No source');
        return;
      }

      const state = result.state;

      const turnCounter = state.turn_counter ?? -1;
      if (turnCounter === lastRenderedTurnCounter) return; // No change

      lastRenderedTurnCounter = turnCounter;
      selectedCell = null; // Reset inspector selection on new turn
      document.getElementById('inspector-content').innerHTML =
        '<span class="inspector-empty">Click a generated cell to inspect.</span>';

      try {
        render(state, result.visibility);
        renderTree(result.visibility);
        refreshWgLog();
      } catch (e) {
        showError('Render Error', e.message || 'Unknown render error.');
        setStatus('Error');
      }
    }

    // ── Worldgen Log Panel ─────────────────────────────────────────────────────
    let _wgLogShown = false;

    function toggleWgLog() {
      _wgLogShown = !_wgLogShown;
      const panel = document.getElementById('wglog-panel');
      if (_wgLogShown) {
        panel.classList.add('visible');
        refreshWgLog();
      } else {
        panel.classList.remove('visible');
      }
    }

    function refreshWgLog() {
      if (!_wgLogShown) return;
      let wgLog = null;
      try {
        wgLog = window.opener?.lastGameResponse?.worldgen_log || null;
      } catch (_) { wgLog = null; }

      const label = document.getElementById('wglog-label');
      const entries = document.getElementById('wglog-entries');

      if (!wgLog || !Array.isArray(wgLog) || wgLog.length === 0) {
        label.textContent = 'No worldgen log yet — open game and play Turn 1';
        entries.innerHTML = '';
        return;
      }

      label.textContent = `${wgLog.length} entries · last at ${wgLog[wgLog.length - 1]?.ms ?? '?'}ms`;
      entries.innerHTML = wgLog.map(e => {
        const dataStr = e.data != null ? JSON.stringify(e.data) : '';
        return `<div class="wglog-entry">
          <span class="wglog-ms">${e.ms ?? '?'}ms</span>
          <span class="wglog-pass">${escapeHtml(String(e.pass ?? ''))}</span>
          <span class="wglog-step">${escapeHtml(String(e.step ?? ''))}</span>
          <span class="wglog-data">${escapeHtml(dataStr)}</span>
        </div>`;
      }).join('');
    }

    function copyWgLog() {
      let wgLog = null;
      try { wgLog = window.opener?.lastGameResponse?.worldgen_log || null; } catch (_) { wgLog = null; }
      if (!wgLog) { alert('No worldgen log available yet.'); return; }
      navigator.clipboard.writeText(JSON.stringify(wgLog, null, 2))
        .then(() => { document.getElementById('wglog-label').textContent = 'Copied to clipboard!'; })
        .catch(() => { alert('Clipboard write failed.'); });
    }

    // ── Init ───────────────────────────────────────────────────────────────────
    poll(); // Immediate check on load
    setInterval(poll, POLL_INTERVAL_MS);

    // ── Zoom / Pan event listeners ─────────────────────────────────────────────
    const mapViewport = document.getElementById('map-viewport');

    // Mouse wheel — zoom centered on cursor position
    mapViewport.addEventListener('wheel', e => {
      e.preventDefault();
      const rect = mapViewport.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;
      const factor = e.deltaY < 0 ? 1.08 : 1 / 1.08;
      const newScale = vpScale * factor;
      const scaleDelta = newScale / vpScale;
      // Adjust translate so the point under the mouse stays fixed
      vpX = mouseX - (mouseX - vpX) * scaleDelta;
      vpY = mouseY - (mouseY - vpY) * scaleDelta;
      vpScale = newScale;
      // Clamp user-initiated zoom — fit initializer is exempt from these limits
      vpScale = Math.min(Math.max(vpScale, MIN_SCALE), MAX_SCALE);
      clampPan();
      applyTransform();
    }, { passive: false });

    // Mousedown — begin drag
    mapViewport.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      isDragging = true;
      wasDragged = false;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      dragStartVpX = vpX;
      dragStartVpY = vpY;
      mapViewport.classList.add('dragging');
    });

    // Mousemove — pan
    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      const dx = e.clientX - dragStartX;
      const dy = e.clientY - dragStartY;
      if (!wasDragged && (Math.abs(dx) > 3 || Math.abs(dy) > 3)) wasDragged = true;
      if (!wasDragged) return;
      vpX = dragStartVpX + dx;
      vpY = dragStartVpY + dy;
      clampPan();
      applyTransform();
    });

    // Mouseup — end drag; suppress click if we actually moved
    window.addEventListener('mouseup', () => {
      if (!isDragging) return;
      isDragging = false;
      mapViewport.classList.remove('dragging');
    });

    // Suppress cell click when the mouseup follows a drag
    mapViewport.addEventListener('click', e => {
      if (wasDragged) {
        e.stopPropagation();
        wasDragged = false;
      }
    }, true); // capture phase so it fires before the cell's own listener
  </script>
</body>
